<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Video Experience</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>

    <!-- 🔘 BOTÓN UI (toggle sonido) -->
    <button id="soundButton" style="position: fixed; top: 20px; left: 20px; z-index: 9999; padding: 10px 15px; font-size: 16px;">
        🔇 Activar sonido
    </button>

    <a-scene mindar-image="imageTargetSrc: ./marker.mind; autoStart: false; uiError:no; uiLoading:no; uiScanning:no;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        renderer="colorManagement: true;"
        cursor="rayOrigin: mouse">

        <a-assets>
            <video id="ar-video" src="./asset.mp4" loop muted playsinline crossorigin="anonymous"></video>
        </a-assets>
        
        <a-camera position="0 0 0"
            look-controls="enabled: false"
            cursor="fuse: false; rayOrigin: mouse;"
            raycaster="near: 0.1; far: 10000; objects: .clickable">
        </a-camera>

        <a-entity id="ar-target" mindar-image-target="targetIndex: 0">

            <!-- 🎬 VIDEO -->
            <a-plane
                src="#ar-video"
                position="0 0 0"
                height="1"
                width="1.75">
            </a-plane>

            <!-- 🔊 BOTÓN DENTRO DEL AR -->
            <a-plane
                id="arSoundButton"
                class="clickable"
                position="0 -0.8 0"
                height="0.3"
                width="0.8"
                color="#000"
                opacity="0.7"
                text="value: 🔇 Sonido; align: center; color: #FFF;">
            </a-plane>

        </a-entity>
    </a-scene>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const arTarget = document.querySelector('#ar-target');
            const video = document.querySelector('#ar-video');
            const uiButton = document.querySelector('#soundButton');
            const arButton = document.querySelector('#arSoundButton');

            let soundOn = false;

            function toggleSound() {
                soundOn = !soundOn;
                video.muted = !soundOn;
                video.play();

                // UI botón HTML
                uiButton.textContent = soundOn ? "🔊 Sonido activado" : "🔇 Activar sonido";

                // Botón AR
                arButton.setAttribute(
                    "text",
                    "value",
                    soundOn ? "🔊 Sonido ON" : "🔇 Sonido OFF"
                );
            }

            // ▶️ AR tracking
            arTarget.addEventListener('targetFound', () => { 
                video.play().catch(e => console.error(e)); 
            });

            arTarget.addEventListener('targetLost', () => { 
                video.pause(); 
            });

            // 🔘 Botón UI
            uiButton.addEventListener('click', toggleSound);

            // 🟩 Botón dentro del AR
            arButton.addEventListener('click', toggleSound);
        });
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const sceneEl = document.querySelector('a-scene');
            let arSystemRunning = false;
            
            sceneEl.addEventListener('loaded', function () {
                const arSystem = sceneEl.systems['mindar-image-system'];
                if (arSystem && arSystem.start && !arSystemRunning) {
                    arSystem.start();
                    arSystemRunning = true;
                }
            });
        });
    </script>

</body>
</html>
