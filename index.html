<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Video Experience - Multi Target</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
    <a-scene mindar-image="imageTargetSrc: ./gato.mind; autoStart: true; uiError:yes; uiLoading:yes; uiScanning:yes;" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false" 
             renderer="colorManagement: true;">
        
        <a-assets>
            <video id="video-gato" src="./gato.mp4" loop playsinline crossorigin="anonymous"></video>
            <video id="video-lloro" src="./lloro.mp4" loop playsinline crossorigin="anonymous"></video>
        </a-assets>
        
        <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="near: 10; far: 10000; objects: .clickable"></a-camera>

        <a-entity id="target-gato" mindar-image-target="targetIndex: 0">
            <a-plane src="#video-gato" position="0 0 0" height="1" width="1.77"></a-plane>
        </a-entity>

        <a-entity id="target-lloro" mindar-image-target="targetIndex: 1">
            <a-plane src="#video-lloro" position="0 0 0" height="1" width="1.77"></a-plane>
        </a-entity>

    </a-scene>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Configuración para Gato
            const targetGato = document.querySelector('#target-gato');
            const videoGato = document.querySelector('#video-gato');
            
            targetGato.addEventListener('targetFound', () => { 
                console.log("Gato detectado");
                videoGato.play().catch(e => console.error("Error Gato:", e)); 
            });
            targetGato.addEventListener('targetLost', () => { videoGato.pause(); });

            // Configuración para Lloro
            const targetLloro = document.querySelector('#target-lloro');
            const videoLloro = document.querySelector('#video-lloro');
            
            targetLloro.addEventListener('targetFound', () => { 
                console.log("Lloro detectado");
                videoLloro.play().catch(e => console.error("Error Lloro:", e)); 
            });
            targetLloro.addEventListener('targetLost', () => { videoLloro.pause(); });
        });
    </script>
</body>
</html>
