<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realidad Aumentada - Gato y Lloro</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
        /* Estilos para los botones de sonido */
        .ui-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 1000;
        }
        button {
            padding: 10px 15px;
            border-radius: 20px;
            border: none;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            cursor: pointer;
            font-family: sans-serif;
        }
        button:hover { background: rgba(0, 0, 0, 0.9); }
    </style>
</head>
<body>

    <div class="ui-container">
        <button onclick="toggleAudio('videoGato', this)">Sonido Gato: OFF</button>
        <button onclick="toggleAudio('videoLloro', this)">Sonido Lloro: OFF</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./gato.mind; ./lloro.mind; autoStart: true; uiScanning: #scanning-overlay" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="videoGato" src="./gato.mp4" preload="auto" loop="true" muted playsinline></video>
            <video id="videoLloro" src="./lloro.mp4" preload="auto" loop="true" muted playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#videoGato" width="1" height="1" position="0 0 0"></a-video>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 1">
            <a-video src="#videoLloro" width="1" height="1" position="0 0 0"></a-video>
        </a-entity>

    </a-scene>

    <script>
        // Función para activar/desactivar sonido de forma independiente
        function toggleAudio(videoId, button) {
            const video = document.getElementById(videoId);
            if (video.muted) {
                video.muted = false;
                button.innerText = (videoId === 'videoGato' ? "Sonido Gato: ON" : "Sonido Lloro: ON");
                button.style.background = "rgba(0, 150, 0, 0.8)";
            } else {
                video.muted = true;
                button.innerText = (videoId === 'videoGato' ? "Sonido Gato: OFF" : "Sonido Lloro: OFF");
                button.style.background = "rgba(0, 0, 0, 0.7)";
            }
        }

        // Lógica para reproducir el video cuando se detecta el marcador y pausar cuando se pierde
        const targets = document.querySelectorAll('[mindar-image-target]');
        const videos = [document.getElementById('videoGato'), document.getElementById('videoLloro')];

        targets.forEach((target, index) => {
            target.addEventListener("targetFound", event => {
                videos[index].play();
            });
            target.addEventListener("targetLost", event => {
                videos[index].pause();
            });
        });
    </script>
</body>
</html>
