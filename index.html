<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realidad Aumentada - Un amigo con un par de bigotes</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
        /* Estilo para el botón de inicio (necesario por políticas de reproducción de video) */
        #ui {
            position: fixed; z-index: 1000; bottom: 20px; left: 50%;
            transform: translateX(-50%);
        }
        button {
            padding: 10px 20px; border-radius: 20px; border: none;
            background: #fff; font-weight: bold; cursor: pointer;
        }
    </style>
</head>

<body>
    <div id="ui">
        <button id="btnPlay">ACTIVAR SONIDO</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: yes;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
      
        <a-assets>
            <video id="vidTormenta" src="tormenta.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline></video>
            <video id="vidTostada" src="tostada.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline></video>
            <video id="vidCucaracha" src="cucaracha.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline></video>
            <video id="vidDinosaurio" src="dinosaurio.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline></video>
            <video id="vidMike" src="mike.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline></video>
            <video id="vidCasa" src="casa.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline></video>
            <video id="vidDibujo" src="dibujo.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline></video>
            <video id="vidTelefono" src="telefono.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline></video>
            <video id="vidArbol" src="arbol.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline></video>
            <video id="vidEnsalada" src="ensalada.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline></video>
            <video id="vidMudanza" src="mudanza.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline></video>
            <video id="vidPiano" src="piano.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline></video>
            <video id="vidNota" src="nota.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline></video>
            <video id="vidCuerdas" src="cuerdas.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline></video>
            <video id="vidCasaarbol" src="casaarbol.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline></video>
            <video id="vidRusa" src="rusa.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline></video>
            <video id="vidBebe" src="bebe.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline></video>
            <video id="vidGato" src="gato.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline></video>
            <video id="vidCesped" src="cesped.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline></video>
            <video id="vidGaviota" src="gaviota.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline></video>
            <video id="vidElefante" src="elefante.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline></video>
            <video id="vidJirafa" src="jirafa.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline></video>
            <video id="vidBocadillo" src="bocadillo.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="targetTormenta">
            <a-video src="#vidTormenta" width="1" height="0.56" position="0 0 0"></a-video>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 1" id="targetTostada">
            <a-video src="#vidTostada" width="1" height="0.56" position="0 0 0"></a-video>
        </a-entity>

         <a-entity mindar-image-target="targetIndex: 2" id="targetCucaracha">
            <a-video src="#vidCucaracha" width="1" height="0.56" position="0 0 0"></a-video>
        </a-entity>
        
        <a-entity mindar-image-target="targetIndex: 3" id="targetDinosaurio">
            <a-video src="#vidDinosaurio" width="1" height="0.56" position="0 0 0"></a-video>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 4" id="targetMike">
            <a-video src="#vidMike" width="1" height="0.56" position="0 0 0"></a-video>
        </a-entity>
        
        <a-entity mindar-image-target="targetIndex: 5" id="targetCasa">
            <a-video src="#vidCasa" width="1" height="0.56" position="0 0 0"></a-video>
        </a-entity>
            
        <a-entity mindar-image-target="targetIndex: 6" id="targetDibujo">
            <a-video src="#vidDibujo" width="1" height="0.56" position="0 0 0"></a-video>
        </a-entity>
        
        <a-entity mindar-image-target="targetIndex: 7" id="targetTelefono">
            <a-video src="#vidTelefono" width="1" height="0.56" position="0 0 0"></a-video>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 8" id="targetArbol">
            <a-video src="#vidArbol" width="1" height="0.56" position="0 0 0"></a-video>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 9" id="targetEnsalada">
            <a-video src="#vidEnsalada" width="1" height="0.56" position="0 0 0"></a-video>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 10" id="targetMudanza">
            <a-video src="#vidMudanza" width="1" height="0.56" position="0 0 0"></a-video>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 11" id="targetPiano">
            <a-video src="#vidPiano" width="1" height="0.56" position="0 0 0"></a-video>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 12" id="targetNota">
            <a-video src="#vidNota" width="1" height="0.56" position="0 0 0"></a-video>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 13" id="targetCuerdas">
            <a-video src="#vidCuerdas" width="1" height="0.56" position="0 0 0"></a-video>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 14" id="targetCasaarbol">
            <a-video src="#vidCasaarbol" width="1" height="0.56" position="0 0 0"></a-video>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 15" id="targetRusa">
            <a-video src="#vidRusa" width="1" height="0.56" position="0 0 0"></a-video>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 16" id="targetBebe">
            <a-video src="#vidBebe" width="1" height="0.56" position="0 0 0"></a-video>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 17" id="targetGato">
            <a-video src="#vidGato" width="1" height="0.56" position="0 0 0"></a-video>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 18" id="targetCesped">
            <a-video src="#vidCesped" width="1" height="0.56" position="0 0 0"></a-video>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 19" id="targetGaviota">
            <a-video src="#vidGaviota" width="1" height="0.56" position="0 0 0"></a-video>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 20" id="targetElefante">
            <a-video src="#vidElefante" width="1" height="0.56" position="0 0 0"></a-video>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 21" id="targetJirafa">
            <a-video src="#vidJirafa" width="1" height="0.56" position="0 0 0"></a-video>
        </a-entity

        <a-entity mindar-image-target="targetIndex: 22" id="targetBocadillo">
            <a-video src="#vidBocadillo" width="1" height="0.56" position="0 0 0"></a-video>
        </a-entity>

    </a-scene>

    <script>
        const vTormenta = document.querySelector('#vidTormenta');
        const vTostada = document.querySelector('#vidTostada');
        const vCucaracha = document.querySelector('#vidCucaracha');
        const vDinosaurio = document.querySelector('#vidDinosaurio');
        const vMike = document.querySelector('#vidMike');
        const vCasa = document.querySelector('#vidCasa');
        const vDibujo = document.querySelector('#vidDibujo');
        const vTelefono = document.querySelector('#vidTelefono');
        const vArbol = document.querySelector('#vidArbol');
        const vEnsalada = document.querySelector('#vidEnsalada');
        const vMudanza = document.querySelector('#vidMudanza');
        const vPiano = document.querySelector('#vidPiano');
        const vNota = document.querySelector('#vidNota');
        const vCuerdas = document.querySelector('#vidCuerdas');
        const vCasaarbol = document.querySelector('#vidCasaarbol');
        const vRusa = document.querySelector('#vidRusa');
        const vBebe = document.querySelector('#vidBebe');
        const vGato = document.querySelector('#vidGato');
        const vCesped = document.querySelector('#vidCesped');
        const vGaviota = document.querySelector('#vidGaviota');
        const vElefante = document.querySelector('#vidElefante');
        const vJirafa = document.querySelector('#vidJirafa');
        const vBocadillo = document.querySelector('#vidBocadillo');

        const btn = document.querySelector('#btnPlay');

        // Función para manejar reproducción automática al detectar
        const setupTarget = (id, video) => {
            const el = document.querySelector(id);
            el.addEventListener("targetFound", () => video.play());
            el.addEventListener("targetLost", () => video.pause());
        }

        setupTarget('#targetTormenta', vTormenta);
        setupTarget('#targetTostada', vTostada);
        setupTarget('#targetCucaracha', vCucaracha);
        setupTarget('#targetDinosaurio',vDinosaurio);
        setupTarget('#targetMike',vMike);
        setupTarget('#targetCasa',vCasa);
        setupTarget('#targetDibujo',vDibujo);
        setupTarget('#targetTelefono',vTelefono);
        setupTarget('#targetArbol',vArbol);
        setupTarget('#targetEnsalada',vEnsalada);
        setupTarget('#targetMudanza',vMudanza);
        setupTarget('#targetPiano',vPiano);
        setupTarget('#targetNota',vNota);
        setupTarget('#targetCuerdas',vCuerdas);
        setupTarget('#targetCasaarbol',vCasaarbol);
        setupTarget('#targetRusa',vRusa);
        setupTarget('#targetBebe',vBebe);
        setupTarget('#targetGato',vGato);
        setupTarget('#targetCesped',vCesped);
        setupTarget('#targetGaviota',vGaviota);
        setupTarget('#targetElefante',vElefante);
        setupTarget('#targetJirafa',vJirafa);
        setupTarget('#targetBocadillo',vBocadillo);

        // Los navegadores bloquean el video con sonido si no hay interacción previa
        btn.addEventListener('click', () => {
            vTormenta.muted = false;
            vTostada.muted = false;
            vCucaracha.muted = false;
            vDinosaurio.muted = false;
            vMike.muted = false;
            vCasa.muted = false;
            vDibujo.muted = false;
            vTelefono.muted = false;
            vArbol.muted = false;
            vEnsalada.muted = false;
            vMudanza.muted = false;
            vPiano.muted = false;
            vNota.muted = false;
            vCuerdas.muted = false;
            vCasaarbol.muted = false;
            vRusa.muted = false;
            vBebe.muted = false;
            vGato.muted = false;
            vCesped.muted = false;
            vGaviota.muted = false;
            vElefante.muted = false;
            vJirafa.muted = false;
            vBocadillo.muted = false;

            btn.style.display = 'none';
        });
    </script>
</body>
</html>
