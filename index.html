<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Video Experience - Gato</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
    <a-scene mindar-image="imageTargetSrc: ./gato.mind; autoStart: true; uiError:yes; uiLoading:yes; uiScanning:yes;" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false" 
             renderer="colorManagement: true;">
        
        <a-assets>
            <video id="ar-video" src="./gato.mp4" loop playsinline crossorigin="anonymous"></video>
        </a-assets>
        
        <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="near: 10; far: 10000; objects: .clickable"></a-camera>

        <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
            <a-plane
                src="#ar-video"
                position="0 0 0"
                rotation="0 0 0"
                height="1"
                width="1.77" 
            ></a-plane>
        </a-entity>
    </a-scene>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const arTarget = document.querySelector('#ar-target');
            const video = document.querySelector('#ar-video');
            
            // Manejo de reproducción automática al detectar el marcador
            arTarget.addEventListener('targetFound', () => { 
                console.log("Gato detectado");
                video.play().catch(e => console.error("Error al reproducir video:", e)); 
            });

            arTarget.addEventListener('targetLost', () => { 
                console.log("Gato perdido");
                video.pause(); 
            });
        });
    </script>
</body>
</html>
