<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Video Experience</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>

<!-- 🔘 BOTÓN GLOBAL -->
<button id="soundButton" style="position: fixed; top: 20px; left: 20px; z-index: 9999; padding: 10px 15px; font-size: 16px;">
    🔇 Activar sonido global
</button>

<a-scene 
    mindar-image="imageTargetSrc: ./marker.mind; autoStart: false; uiError:no; uiLoading:no; uiScanning:no;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="colorManagement: true;"
    cursor="rayOrigin: mouse">

    <a-assets>
        <video id="ar-video-1" src="./asset.mp4" loop muted playsinline crossorigin="anonymous"></video>
        <video id="ar-video-2" src="./gato.mp4" loop muted playsinline crossorigin="anonymous"></video>
    </a-assets>

    <a-camera position="0 0 0"
        look-controls="enabled: false"
        cursor="fuse: false; rayOrigin: mouse;"
        raycaster="near: 0.1; far: 10000; objects: .clickable">
    </a-camera>

    <!-- 🟢 MARCADOR 1 -->
    <a-entity id="target1" mindar-image-target="targetIndex: 0">

        <a-plane src="#ar-video-1" position="0 0 0" height="1" width="1.75"></a-plane>

        <a-plane
            id="btn1"
            class="clickable"
            position="0 -0.8 0"
            height="0.3"
            width="0.8"
            color="#000"
            opacity="0.7"
            text="value: 🔇 Sonido; align: center; color: #FFF;">
        </a-plane>

    </a-entity>

    <!-- 🔵 MARCADOR 2 -->
    <a-entity id="target2" mindar-image-target="targetIndex: 1">

        <a-plane src="#ar-video-2" position="0 0 0" height="1" width="1.75"></a-plane>

        <a-plane
            id="btn2"
            class="clickable"
            position="0 -0.8 0"
            height="0.3"
            width="0.8"
            color="#000"
            opacity="0.7"
            text="value: 🔇 Sonido; align: center; color: #FFF;">
        </a-plane>

    </a-entity>

</a-scene>

<script>
document.addEventListener('DOMContentLoaded', function() {

    const video1 = document.querySelector('#ar-video-1');
    const video2 = document.querySelector('#ar-video-2');

    const target1 = document.querySelector('#target1');
    const target2 = document.querySelector('#target2');

    const btn1 = document.querySelector('#btn1');
    const btn2 = document.querySelector('#btn2');

    const globalBtn = document.querySelector('#soundButton');

    // Estados independientes
    let sound1 = false;
    let sound2 = false;

    // 🔊 Toggle individual
    function toggleSound1() {
        sound1 = !sound1;
        video1.muted = !sound1;
        video1.play();

        btn1.setAttribute(
            "text",
            "value",
            sound1 ? "🔊 Sonido ON" : "🔇 Sonido OFF"
        );
    }

    function toggleSound2() {
        sound2 = !sound2;
        video2.muted = !sound2;
        video2.play();

        btn2.setAttribute(
            "text",
            "value",
            sound2 ? "🔊 Sonido ON" : "🔇 Sonido OFF"
        );
    }

    // 🔘 Botón global (activa/desactiva ambos)
    function toggleGlobalSound() {
        const enable = !(sound1 && sound2);

        sound1 = enable;
        sound2 = enable;

        video1.muted = !enable;
        video2.muted = !enable;

        video1.play();
        video2.play();

        globalBtn.textContent = enable ? "🔊 Sonido global ON" : "🔇 Activar sonido global";

        btn1.setAttribute("text", "value", enable ? "🔊 Sonido ON" : "🔇 Sonido OFF");
        btn2.setAttribute("text", "value", enable ? "🔊 Sonido ON" : "🔇 Sonido OFF");
    }

    // ▶️ Tracking
    target1.addEventListener('targetFound', () => {
        video1.play().catch(e => console.error(e));
    });

    target1.addEventListener('targetLost', () => {
        video1.pause();
    });

    target2.addEventListener('targetFound', () => {
        video2.play().catch(e => console.error(e));
    });

    target2.addEventListener('targetLost', () => {
        video2.pause();
    });

    // 🎯 Eventos botones
    btn1.addEventListener('click', toggleSound1);
    btn2.addEventListener('click', toggleSound2);
    globalBtn.addEventListener('click', toggleGlobalSound);

});
</script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const sceneEl = document.querySelector('a-scene');
    let started = false;

    sceneEl.addEventListener('loaded', function () {
        const arSystem = sceneEl.systems['mindar-image-system'];
        if (arSystem && arSystem.start && !started) {
            arSystem.start();
            started = true;
        }
    });
});
</script>

</body>
</html>
